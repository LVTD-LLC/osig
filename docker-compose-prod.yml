# docker compose -f docker-compose-prod.yml -p "osig" up --detach --remove-orphans || true

services:
  db:
    image: rasulkireev/custom-postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    env_file:
      - .env

  backend:
    image: "${APP_IMAGE:-osig:latest}"
    working_dir: /app
    ports:
      - "8000:80"
    environment:
      APP_PROCESS_TYPE: server
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  workers:
    image: "${APP_IMAGE:-osig:latest}"
    working_dir: /app
    environment:
      APP_PROCESS_TYPE: worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  mcp:
    image: "${APP_IMAGE:-osig:latest}"
    working_dir: /app
    ports:
      - "8765:80"
    environment:
      APP_PROCESS_TYPE: mcp
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data:
