name: Deploy Prod

on:
  push:
    branches:
      - main

env:
  CAPROVER_APP_NAME: osig

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          image_name="ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: deployment/Dockerfile
          tags: |
            ${{ steps.image.outputs.image_name }}:latest
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Deploy server to CapRover
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP_NAME }}
          token: ${{ secrets.APP_TOKEN }}
          image: ${{ steps.image.outputs.image_name }}:${{ github.sha }}

      - name: Deploy workers to CapRover
        uses: caprover/deploy-from-github@main
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ env.CAPROVER_APP_NAME }}-workers
          token: ${{ secrets.WORKERS_APP_TOKEN }}
          image: ${{ steps.image.outputs.image_name }}:${{ github.sha }}
