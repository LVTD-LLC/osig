{% if messages %}
<div class="message-stack">
  {% for message in messages %}
  <div
    data-message-container
    role="{% if message.tags == 'error' %}alert{% else %}status{% endif %}"
    aria-live="{% if message.tags == 'error' %}assertive{% else %}polite{% endif %}"
    aria-atomic="true"
    class="max-w-sm rounded-lg border {% if message.tags == 'error' %}bg-[var(--osig-danger-soft)] border-[var(--osig-danger)]{% else %}bg-[var(--osig-success-soft)] border-[var(--osig-success)]{% endif %} p-4 transition-opacity duration-150 ease-out"
  >
    <div class="flex items-start">
      <div class="flex-shrink-0 mr-3">
        <svg class="mt-1 h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="text-[var(--osig-line)]" stroke-width="2" stroke="currentColor" fill="transparent" r="10" cx="12" cy="12"/>
          <path class="{% if message.tags == 'error' %}text-[var(--osig-danger)]{% else %}text-[var(--osig-success)]{% endif %}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" d="{% if message.tags == 'error' %}M12 7v6m0 4h.01{% else %}m8 12 3 3 5-6{% endif %}"/>
        </svg>
      </div>
      <div class="min-w-0 flex-grow">
        <p class="break-words text-sm font-semibold {% if message.tags == 'error' %}text-[var(--osig-danger)]{% else %}text-[var(--osig-success)]{% endif %}">
          {{ message }}
        </p>
      </div>
      <div class="flex-shrink-0 ml-3">
        <button data-message-dismiss type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-md {% if message.tags == 'error' %}text-[var(--osig-danger)]{% else %}text-[var(--osig-success)]{% endif %} focus:outline-none focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[var(--osig-accent)]">
          <span class="sr-only">Dismiss</span>
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
  function hideMessage(item) {
    item.classList.add('opacity-0');
    setTimeout(() => {
      item.remove();
    }, 150);
  }

  document.addEventListener('click', (event) => {
    const dismissButton = event.target.closest('[data-message-dismiss]');
    if (dismissButton) {
      const item = dismissButton.closest('[data-message-container]');
      if (item) {
        hideMessage(item);
      }
    }
  });
</script>
{% endif %}
