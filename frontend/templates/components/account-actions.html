<div class="flex flex-wrap gap-3">
  <a href="{% url 'home' %}" class="btn-secondary">Back to OSIG</a>
  {% if user.is_authenticated %}
  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn-ghost">Sign out</button>
  </form>
  {% endif %}
</div>
